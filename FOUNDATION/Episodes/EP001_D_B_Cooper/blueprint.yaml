      production_method: blender
      editing: "cut"
    - shot: 4
      time: ["04:20", "04:45"]
      narration: "Whether it is a real bomb... No one will ever know."
      characters: [CH-002]
      assets: []
      camera: {type: "close-up reaction shot", lens: "85mm"}
      direction: "hold on ambiguity; no resolution"
      voice_direction: {emotion: mystery, pause_after: "no one will ever know"}
      production_method: blender
      editing: "slow fade"

