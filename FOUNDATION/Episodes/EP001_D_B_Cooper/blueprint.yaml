      voice_direction: {emotion: calm}
      production_method: blender
      editing: "cut"
    - shot: 2
      time: ["02:20", "02:35"]
      narration: "She assumes it is another businessman flirting with her. Without reading it, she slips it into her purse."
      characters: [CH-002]
      assets: [LOC-002]
      camera: {type: "close-up on hands/purse", lens: "85mm"}
      direction: "CH-002's casual, dismissive reaction"
      voice_direction: {emotion: light, slightly wry}
      production_method: blender
      editing: "cut"
    - shot: 3
      time: ["02:35", "02:50"]
      narration: "Cooper quietly leans toward her. \"Miss... you'd better read the note.\""
      characters: [CH-001, CH-002]
      assets: [LOC-002, AUD-007]
      camera: {type: "close-up two-shot", lens: "85mm", movement: "static"}
      direction: "first shift in tone — Cooper's calm becomes deliberate, not aggressive"
      voice_direction: {emotion: "controlled tension", speed: slow, emphasis: "you'd better read the note"}
      production_method: blender
      editing: "cut"
    - shot: 4
      time: ["02:50", "03:15"]
      narration: "The message is short. \"I have a bomb.\" Within seconds... An ordinary flight becomes a hijacking."
      characters: [CH-002]
      assets: [OBJ-003, LOC-002, AUD-007]
      camera: {type: "extreme close-up on note text", lens: "100mm macro", movement: "slow push-in"}
      direction: "hold on Florence's reaction; do not overplay panic (per CH-002 emotional rules: controlled nervousness only)"
      voice_direction: {emotion: "serious, controlled tension", pause_after: "I have a bomb"}
      music: {AUD-010: "shift to unsettled tone"}
      production_method: blender
      editing: "hard cut to black beat"

