    - shot: 1
      time: ["02:00", "02:20"]
      narration: "Shortly after takeoff, Cooper orders a bourbon and soda. Moments later, he hands a folded note to flight attendant Florence Schaffner."
      characters: [CH-001, CH-002]
      assets: [LOC-002, AUD-002, AUD-007]
      camera: {type: "medium shot", lens: "50mm", movement: "static, cabin service"}
