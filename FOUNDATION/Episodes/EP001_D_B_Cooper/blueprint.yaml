      production_method: blender
      editing: "cut"
    - shot: 2
      time: ["03:35", "03:55"]
      narration: "Two hundred thousand dollars. Four parachutes. A fuel truck waiting in Seattle. Nothing more. Nothing less."
      characters: [CH-001]
      assets: [OBJ-002, OBJ-004]
      camera: {type: "close-up", lens: "85mm", movement: "static"}
      direction: "list delivered plainly, without menace"
