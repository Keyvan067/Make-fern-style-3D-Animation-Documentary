      narration: "When Florence sits beside him, Cooper opens his briefcase just enough for her to see several red cylinders, wires and a battery."
      characters: [CH-001, CH-002]
      assets: [OBJ-003, LOC-002]
      camera: {type: "close-up on briefcase interior (partial reveal only)", lens: "85mm"}
      direction: "never fully reveal — maintain ambiguity on authenticity (OBJ-003 rule)"
