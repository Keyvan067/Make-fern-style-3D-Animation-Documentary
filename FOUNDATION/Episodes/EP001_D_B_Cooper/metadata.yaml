description: >
  On November 24, 1971, a calm, well-dressed man calling himself Dan Cooper
  boarded Northwest Orient Flight 305 with nothing but a black briefcase.
  Hours later, he had hijacked the aircraft, collected $200,000 in ransom,
  and vanished into a violent storm over the Pacific Northwest — parachuting
  out of a Boeing 727 somewhere between Seattle and Reno.

  More than fifty years later, the FBI's NORJAK investigation — one of the
  longest in its history — has never confirmed his identity, his fate, or
  where the rest of the money went. This documentary walks through the
  confirmed timeline, the physical evidence, and the leading theories,
  separating what is actually known from what remains speculation.

  Sources: FBI NORJAK case files, FAA historical records, flight crew
  testimony, and contemporary news archives.

