# asset_library/registry.yaml
# Master index of every reusable character/location/object built in Blender.
# Check this BEFORE creating anything new in an episode's characters.yaml / assets.yaml.
# Each entry's blend_file is the reusable source of truth — append/link it into
# any shot scene rather than rebuilding.

characters:
  - id: CH-001
    name: "Dan Cooper"
    origin_episode: EP001_D_B_Cooper
    blend_file: asset_library/characters/CH001_DanCooper.blend
    reusable_as: "specific named character — only reuse if a future episode is literally about this person"
    notes: "built directly from physical/personality profile, Fern-style flat-shaded low-poly"

locations: []
objects:
  - id: OBJ-001
    name: "Black Leather Briefcase"
    origin_episode: EP001_D_B_Cooper
    blend_file: asset_library/characters/CH001_DanCooper.blend   # currently embedded in character file
    reusable_as: "generic 1970s business briefcase prop — reusable across episodes"

generic_archetypes_to_build_next:
  # These recur across almost every true-crime/mystery episode — worth building
  # once as generic, re-skinnable archetypes instead of one-off per episode.
  - "generic investigator (FBI/police type, 1970s-90s)"
  - "generic airport/interior terminal block-out"
  - "generic office/investigation-room interior"
  - "generic period-appropriate vehicle set (sedan, aircraft)"
